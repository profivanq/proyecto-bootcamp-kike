document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-weight: 800;\n  font-display: swap;\n  src: url(\"7a49de23-a491-4a37-81d5-2ccc76f5676a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"a5df1be5-7b07-40c0-ae4e-9c3ce280d681\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;background:#eef2f6;font-family:'Public Sans',system-ui,sans-serif;color:#0f172a;-webkit-font-smoothing:antialiased;}\n  button{font-family:inherit;}\n  input,select{font-family:inherit;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column;\">\n\n  <!-- Top bar -->\n  <div style=\"{{ headerStyle }}\">\n    <div style=\"display:flex;flex-direction:column;line-height:1.15;\">\n      <span style=\"font-size:18px;font-weight:800;letter-spacing:-.2px;\">Planificador de Sábados<\u002Fspan>\n      <span style=\"font-size:12px;opacity:.7;font-weight:600;letter-spacing:.5px;text-transform:uppercase;\">iAcademy · Turnos del mes<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;\">\n      <button style=\"{{ navBtnStyle }}\" onclick=\"{{ onPrev }}\">‹<\u002Fbutton>\n      <span style=\"font-size:16px;font-weight:700;min-width:150px;text-align:center;text-transform:capitalize;\">{{ monthLabel }}<\u002Fspan>\n      <button style=\"{{ navBtnStyle }}\" onclick=\"{{ onNext }}\">›<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <div style=\"{{ alertStyle }}\" onclick=\"{{ onOpenAlerts }}\">{{ alertText }}<\u002Fdiv>\n      <button style=\"{{ exportBtnStyle }}\" onclick=\"{{ onExport }}\">⬇ Exportar JPG<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Body -->\n  <div style=\"display:flex;gap:20px;padding:20px;align-items:flex-start;flex:1;\">\n\n    <!-- Sidebar -->\n    <div style=\"width:330px;flex:0 0 330px;background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.08);overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #eef2f6;\">\n        <span style=\"font-weight:800;font-size:15px;\">Colaboradores<\u002Fspan>\n        <button style=\"{{ addBtnStyle }}\" onclick=\"{{ onAdd }}\">+ Agregar<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px;padding:14px;max-height:640px;overflow-y:auto;\">\n        <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;align-items:flex-start;gap:11px;padding:11px 12px;border-radius:11px;border:1px solid #eef2f6;background:#fff;\">\n            <span style=\"{{ r.dotStyle }}\"><\u002Fspan>\n            <div style=\"flex:1;min-width:0;\">\n              <div style=\"font-weight:700;font-size:14px;\">{{ r.name }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#94a3b8;margin-top:1px;\">{{ r.role }}<\u002Fdiv>\n              <div style=\"display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;\">\n                <span style=\"{{ r.modeStyle }}\">{{ r.modeLabel }}<\u002Fspan>\n                <span style=\"{{ r.libreStyle }}\">{{ r.libreLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:5px;\">\n              <button style=\"{{ editBtnStyle }}\" onclick=\"{{ r.onEdit }}\">Editar<\u002Fbutton>\n              <button style=\"{{ delBtnStyle }}\" onclick=\"{{ r.onDelete }}\">Eliminar<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Main planner -->\n    <div id=\"plan-export\" style=\"flex:1;min-width:0;background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.08);overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #eef2f6;flex-wrap:wrap;gap:12px;\">\n        <div style=\"display:flex;flex-direction:column;line-height:1.15;\">\n          <span style=\"font-weight:800;font-size:15px;\">Asignación de turnos · <span style=\"text-transform:capitalize;\">{{ monthLabel }}<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:12px;color:#94a3b8;\">Haz clic en una celda para rotar: AM → PM → Completo → Libre<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:7px;flex-wrap:wrap;\">\n          <span style=\"font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;\">AM · 8–1<\u002Fspan>\n          <span style=\"font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;\">PM · 1–5<\u002Fspan>\n          <span style=\"font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;\">Completo · 8–5<\u002Fspan>\n          <span style=\"font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1;\">Libre<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"overflow-x:auto;padding:14px 18px 20px;\">\n        <div style=\"min-width:640px;display:flex;flex-direction:column;gap:8px;\">\n\n          <!-- Header row -->\n          <div style=\"display:flex;align-items:stretch;\">\n            <div style=\"width:220px;flex:0 0 220px;display:flex;align-items:center;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#94a3b8;padding:0 8px;\">Colaborador<\u002Fdiv>\n            <div style=\"display:flex;flex:1;gap:8px;\">\n              <sc-for list=\"{{ satData }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div style=\"flex:1;min-width:104px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 0;background:#f8fafc;border-radius:9px;\">\n                  <span style=\"font-size:15px;font-weight:800;\">{{ s.head }}<\u002Fspan>\n                  <span style=\"font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;\">{{ s.sub }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Collaborator rows -->\n          <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;\">\n              <div style=\"width:220px;flex:0 0 220px;display:flex;align-items:center;gap:9px;padding:0 8px;\">\n                <span style=\"{{ r.dotStyle }}\"><\u002Fspan>\n                <div style=\"display:flex;flex-direction:column;line-height:1.15;min-width:0;\">\n                  <span style=\"font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ r.name }}<\u002Fspan>\n                  <span style=\"font-size:11px;color:#94a3b8;\">{{ r.role }}<\u002Fspan>\n                <\u002Fdiv>\n                <sc-if value=\"{{ r.isVirtual }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"margin-left:auto;font-size:9px;font-weight:800;color:#7c3aed;background:#ede9fe;padding:2px 5px;border-radius:5px;\">VIRTUAL<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex:1;gap:8px;\">\n                <sc-for list=\"{{ r.cells }}\" as=\"cell\" hint-placeholder-count=\"4\">\n                  <div style=\"{{ cell.style }}\" onclick=\"{{ cell.onClick }}\">\n                    <span>{{ cell.label }}<\u002Fspan>\n                    <sc-if value=\"{{ cell.hasSub }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;font-weight:600;opacity:.65;\">{{ cell.sub }}<\u002Fspan><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <!-- Coverage rows -->\n          <div style=\"height:1px;background:#eef2f6;margin:6px 0;\"><\u002Fdiv>\n          <sc-for list=\"{{ coverageRows }}\" as=\"cr\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;align-items:stretch;\">\n              <div style=\"width:220px;flex:0 0 220px;display:flex;flex-direction:column;justify-content:center;padding:0 8px;\">\n                <span style=\"font-size:13px;font-weight:800;\">{{ cr.label }}<\u002Fspan>\n                <span style=\"font-size:11px;color:#94a3b8;\">{{ cr.sub }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex:1;gap:8px;\">\n                <sc-for list=\"{{ cr.cells }}\" as=\"cc\" hint-placeholder-count=\"4\">\n                  <div style=\"{{ cc.wrapStyle }}\">\n                    <div style=\"display:flex;flex-wrap:wrap;gap:4px;\">\n                      <sc-for list=\"{{ cc.dots }}\" as=\"d\" hint-placeholder-count=\"4\">\n                        <span style=\"{{ d.style }}\">{{ d.abbr }}<\u002Fspan>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <span style=\"{{ cc.physStyle }}\">{{ cc.physLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <div style=\"display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap;\">\n            <span style=\"font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;\">Roles:<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;\"><span style=\"width:10px;height:10px;border-radius:3px;background:#0e9f6e;\"><\u002Fspan>Vt · Ventas<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;\"><span style=\"width:10px;height:10px;border-radius:3px;background:#2563eb;\"><\u002Fspan>Ad · Administrativo<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;\"><span style=\"width:10px;height:10px;border-radius:3px;background:#7c3aed;\"><\u002Fspan>Cb · Contabilidad<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;\"><span style=\"width:10px;height:10px;border-radius:3px;background:#ea580c;\"><\u002Fspan>Sp · Soporte<\u002Fspan>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Panel de alertas -->\n  <sc-if value=\"{{ alertsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;\" onclick=\"{{ onCloseAlerts }}\">\n      <div style=\"background:#fff;border-radius:18px;width:560px;max-width:100%;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.35);overflow:hidden;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:22px 24px 16px;border-bottom:1px solid #eef2f6;\">\n          <div style=\"display:flex;flex-direction:column;line-height:1.2;\">\n            <span style=\"font-size:18px;font-weight:800;\">Alertas de cobertura<\u002Fspan>\n            <span style=\"font-size:13px;color:#94a3b8;margin-top:2px;\">{{ alertsHeadCount }}<\u002Fspan>\n          <\u002Fdiv>\n          <button style=\"background:#f1f5f9;border:none;width:32px;height:32px;border-radius:9px;font-size:18px;cursor:pointer;color:#475569;line-height:1;\" onclick=\"{{ onCloseAlerts }}\">×<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"padding:16px 20px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;\">\n\n          <sc-if value=\"{{ alertsNone }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:36px 16px;color:#166534;\">\n              <span style=\"font-size:36px;\">✓<\u002Fspan>\n              <span style=\"font-weight:800;font-size:16px;\">Todos los bloques están cubiertos<\u002Fspan>\n              <span style=\"font-size:13px;color:#64748b;max-width:340px;\">Cada turno AM y PM del mes tiene al menos un colaborador por rol y presencia física.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-for list=\"{{ alerts }}\" as=\"al\" hint-placeholder-count=\"0\">\n            <div style=\"border:1px solid #fecaca;border-radius:13px;overflow:hidden;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;background:#fef2f2;border-bottom:1px solid #fee2e2;\">\n                <span style=\"font-weight:800;font-size:14px;color:#991b1b;\">{{ al.title }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:700;color:#b91c1c;background:#fff;border:1px solid #fecaca;padding:2px 8px;border-radius:20px;white-space:nowrap;\">{{ al.count }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding:6px 14px 12px;display:flex;flex-direction:column;\">\n                <sc-for list=\"{{ al.issues }}\" as=\"is\" hint-placeholder-count=\"1\">\n                  <div style=\"padding:10px 0;border-bottom:1px solid #f1f5f9;\">\n                    <div style=\"display:flex;align-items:flex-start;gap:8px;\">\n                      <span style=\"flex:0 0 auto;width:7px;height:7px;border-radius:50%;background:#dc2626;margin-top:6px;\"><\u002Fspan>\n                      <span style=\"font-size:13px;font-weight:700;color:#334155;\">{{ is.problem }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"margin-left:15px;margin-top:7px;display:flex;align-items:flex-start;gap:8px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:9px;padding:8px 11px;\">\n                      <span style=\"flex:0 0 auto;font-size:13px;\">💡<\u002Fspan>\n                      <span style=\"font-size:12.5px;color:#075985;line-height:1.45;\"><strong style=\"font-weight:800;\">Sugerencia:<\u002Fstrong> {{ is.suggestion }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Modal -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;\">\n      <div style=\"background:#fff;border-radius:18px;padding:26px;width:380px;max-width:100%;box-shadow:0 24px 70px rgba(0,0,0,.35);\">\n        <div style=\"font-size:18px;font-weight:800;margin-bottom:18px;\">{{ modalTitle }}<\u002Fdiv>\n\n        <label style=\"font-size:12px;font-weight:700;color:#64748b;display:block;margin-bottom:6px;\">Nombre<\u002Flabel>\n        <input value=\"{{ formName }}\" onchange=\"{{ onName }}\" placeholder=\"Nombre del colaborador\" style=\"width:100%;padding:11px 12px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;margin-bottom:16px;outline:none;\">\n\n        <label style=\"font-size:12px;font-weight:700;color:#64748b;display:block;margin-bottom:6px;\">Rol<\u002Flabel>\n        <select value=\"{{ formRole }}\" onchange=\"{{ onRole }}\" style=\"width:100%;padding:11px 12px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;margin-bottom:16px;outline:none;background:#fff;\">\n          <option value=\"Ventas\">Ventas<\u002Foption>\n          <option value=\"Administrativo\">Administrativo<\u002Foption>\n          <option value=\"Contabilidad\">Contabilidad<\u002Foption>\n          <option value=\"Soporte\">Soporte<\u002Foption>\n        <\u002Fselect>\n\n        <label style=\"font-size:12px;font-weight:700;color:#64748b;display:block;margin-bottom:6px;\">Modalidad<\u002Flabel>\n        <div style=\"display:flex;gap:8px;margin-bottom:8px;\">\n          <button style=\"{{ fisStyle }}\" onclick=\"{{ onFisico }}\">Físico<\u002Fbutton>\n          <button style=\"{{ virStyle }}\" onclick=\"{{ onVirtual }}\">Virtual<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"font-size:11px;color:#94a3b8;margin:0 0 20px;\">Los virtuales no cuentan como presencia física en un bloque.<\u002Fp>\n\n        <div style=\"display:flex;gap:10px;\">\n          <button style=\"{{ cancelBtnStyle }}\" onclick=\"{{ onCancel }}\">Cancelar<\u002Fbutton>\n          <button style=\"{{ saveBtnStyle }}\" onclick=\"{{ onSave }}\">Guardar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:880},&quot;requirePhysical&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Reglas de cobertura&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0e7490&quot;,&quot;options&quot;:[&quot;#0f172a&quot;,&quot;#1e3a8a&quot;,&quot;#0e7490&quot;,&quot;#7c3aed&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Estilo&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const collaborators = [\n      {id:1, name:'Nathaly',   role:'Ventas',         mode:'fisico'},\n      {id:2, name:'Manuela',   role:'Ventas',         mode:'virtual'},\n      {id:3, name:'Alexandra', role:'Ventas',         mode:'virtual'},\n      {id:4, name:'Alejandra', role:'Administrativo', mode:'fisico'},\n      {id:5, name:'Yoselyn',   role:'Contabilidad',   mode:'fisico'},\n      {id:6, name:'Cesar',     role:'Soporte',        mode:'fisico'},\n    ];\n    const A = {};\n    const set=(c,iso,sh)=>{ A[c+'|'+iso]=sh; };\n    // Sábados de Junio 2026: 6, 13, 20, 27\n    set(1,'2026-06-06','LIBRE'); set(2,'2026-06-06','COMP'); set(3,'2026-06-06','AM');   set(4,'2026-06-06','COMP'); set(5,'2026-06-06','LIBRE'); set(6,'2026-06-06','PM');\n    set(1,'2026-06-13','COMP');  set(2,'2026-06-13','LIBRE'); set(3,'2026-06-13','PM');  set(4,'2026-06-13','AM');   set(5,'2026-06-13','COMP');  set(6,'2026-06-13','LIBRE');\n    set(1,'2026-06-20','AM');    set(2,'2026-06-20','PM');   set(3,'2026-06-20','LIBRE'); set(4,'2026-06-20','COMP'); set(5,'2026-06-20','COMP'); set(6,'2026-06-20','COMP');\n    set(1,'2026-06-27','PM');    set(2,'2026-06-27','AM');   set(3,'2026-06-27','COMP'); set(4,'2026-06-27','LIBRE'); set(5,'2026-06-27','AM');   set(6,'2026-06-27','PM');\n    this.state = {\n      collaborators, assignments:A,\n      year:2026, month:5,\n      alertsOpen:false,\n      modalOpen:false, editingId:null,\n      form:{name:'', role:'Ventas', mode:'fisico'},\n      nextId:7,\n    };\n  }\n\n  get ROLES(){ return [\n    {key:'Ventas', color:'#0e9f6e', abbr:'Vt'},\n    {key:'Administrativo', color:'#2563eb', abbr:'Ad'},\n    {key:'Contabilidad', color:'#7c3aed', abbr:'Cb'},\n    {key:'Soporte', color:'#ea580c', abbr:'Sp'},\n  ]; }\n  roleColor(r){ const m=this.ROLES.find(x=>x.key===r); return m?m.color:'#64748b'; }\n\n  shiftMeta(sh){\n    switch(sh){\n      case 'AM':    return {label:'AM', sub:'8–1', bg:'#fef3c7', fg:'#92400e', border:'#fcd34d'};\n      case 'PM':    return {label:'PM', sub:'1–5', bg:'#dbeafe', fg:'#1e40af', border:'#93c5fd'};\n      case 'COMP':  return {label:'Completo', sub:'8–5', bg:'#d1fae5', fg:'#065f46', border:'#6ee7b7'};\n      case 'LIBRE': return {label:'Libre', sub:'', bg:'#f1f5f9', fg:'#64748b', border:'#cbd5e1'};\n      default:      return {label:'—', sub:'', bg:'#ffffff', fg:'#cbd5e1', border:'#e2e8f0'};\n    }\n  }\n\n  saturdays(){\n    const {year,month}=this.state; const res=[]; const d=new Date(year,month,1);\n    while(d.getMonth()===month){ if(d.getDay()===6) res.push(new Date(d.getTime())); d.setDate(d.getDate()+1); }\n    return res;\n  }\n  iso(d){ const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return d.getFullYear()+'-'+m+'-'+day; }\n  shiftOf(cid,iso){ return this.state.assignments[cid+'|'+iso]||''; }\n\n  cycle(cid,iso){\n    const order=['','AM','PM','COMP','LIBRE'];\n    const cur=this.shiftOf(cid,iso); const nx=order[(order.indexOf(cur)+1)%order.length];\n    this.setState(s=>{ const a=Object.assign({},s.assignments); const k=cid+'|'+iso; if(nx==='') delete a[k]; else a[k]=nx; return {assignments:a}; });\n  }\n\n  openAdd(){ this.setState({modalOpen:true, editingId:null, form:{name:'', role:'Ventas', mode:'fisico'}}); }\n  openEdit(c){ this.setState({modalOpen:true, editingId:c.id, form:{name:c.name, role:c.role, mode:c.mode}}); }\n  closeModal(){ this.setState({modalOpen:false}); }\n  setForm(patch){ this.setState(s=>({form:Object.assign({},s.form,patch)})); }\n  saveForm(){\n    const f=this.state.form; if(!f.name.trim()) return;\n    this.setState(s=>{\n      let cols=s.collaborators.slice();\n      if(s.editingId){ cols=cols.map(c=>c.id===s.editingId?Object.assign({},c,{name:f.name.trim(),role:f.role,mode:f.mode}):c); return {collaborators:cols, modalOpen:false}; }\n      const id=s.nextId; cols.push({id, name:f.name.trim(), role:f.role, mode:f.mode}); return {collaborators:cols, nextId:id+1, modalOpen:false};\n    });\n  }\n  deleteCollab(c){\n    this.setState(s=>{\n      const cols=s.collaborators.filter(x=>x.id!==c.id);\n      const a=Object.assign({},s.assignments); Object.keys(a).forEach(k=>{ if(k.split('|')[0]===String(c.id)) delete a[k]; });\n      return {collaborators:cols, assignments:a};\n    });\n  }\n  exportJpg(){\n    const node=document.getElementById('plan-export');\n    if(!node){ return; }\n    if(!window.html2canvas){ alert('La librería de exportación aún se está cargando, intenta de nuevo en un momento.'); return; }\n    const hidden=node.querySelectorAll('[data-noexport]');\n    hidden.forEach(el=>{ el.dataset._prev=el.style.visibility; el.style.visibility='hidden'; });\n    window.html2canvas(node,{backgroundColor:'#ffffff',scale:2,useCORS:true}).then(canvas=>{\n      hidden.forEach(el=>{ el.style.visibility=el.dataset._prev||''; });\n      const a=document.createElement('a');\n      a.href=canvas.toDataURL('image/jpeg',0.95);\n      const mes=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][this.state.month];\n      a.download='programacion-iacademy-'+mes+'-'+this.state.year+'.jpg';\n      a.click();\n    }).catch(()=>{ hidden.forEach(el=>{ el.style.visibility=el.dataset._prev||''; }); });\n  }\n  openAlerts(){ this.setState({alertsOpen:true}); }\n  closeAlerts(){ this.setState({alertsOpen:false}); }\n  prevMonth(){ this.setState(s=>{ let m=s.month-1,y=s.year; if(m<0){m=11;y--;} return {month:m,year:y}; }); }\n  nextMonth(){ this.setState(s=>{ let m=s.month+1,y=s.year; if(m>11){m=0;y++;} return {month:m,year:y}; }); }\n\n  renderVals(){\n    const self=this;\n    const accent=this.props.accent||'#0f172a';\n    const reqPhys=this.props.requirePhysical!==false;\n    const MES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];\n    const MESAB=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];\n    const sats=this.saturdays();\n    const satData=sats.map(d=>({iso:this.iso(d), head:'Sáb '+d.getDate(), sub:MESAB[d.getMonth()]}));\n\n    const cellBase={display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'1px',height:'52px',borderRadius:'9px',cursor:'pointer',fontWeight:700,fontSize:'13px',userSelect:'none',flex:'1',minWidth:'104px'};\n\n    const rows=this.state.collaborators.map(c=>{\n      const cells=satData.map(s=>{\n        const sh=self.shiftOf(c.id,s.iso); const m=self.shiftMeta(sh);\n        return {key:c.id+'|'+s.iso, label:m.label, sub:m.sub, hasSub:!!m.sub,\n          style:Object.assign({},cellBase,{background:m.bg,color:m.fg,border:'1px solid '+m.border}),\n          onClick:()=>self.cycle(c.id,s.iso)};\n      });\n      const libre=satData.filter(s=>self.shiftOf(c.id,s.iso)==='LIBRE').length;\n      const libreOk=libre===1;\n      return {\n        id:c.id, name:c.name, role:c.role,\n        dotStyle:{width:'11px',height:'11px',borderRadius:'4px',background:self.roleColor(c.role),flex:'0 0 auto',marginTop:'2px'},\n        modeLabel:c.mode==='virtual'?'Virtual':'Físico', isVirtual:c.mode==='virtual',\n        modeStyle:{fontSize:'11px',fontWeight:700,padding:'2px 9px',borderRadius:'20px',background:c.mode==='virtual'?'#ede9fe':'#e0f2fe',color:c.mode==='virtual'?'#6d28d9':'#0369a1'},\n        libreLabel:libre+' libre'+(libre===1?'':'s'),\n        libreStyle:{fontSize:'11px',fontWeight:700,padding:'2px 9px',borderRadius:'20px',background:libreOk?'#dcfce7':'#fef3c7',color:libreOk?'#166534':'#92400e'},\n        cells,\n        onEdit:()=>self.openEdit(c), onDelete:()=>self.deleteCollab(c),\n      };\n    });\n\n    let alertCount=0;\n    const covBlocks=[{block:'AM',label:'Cobertura AM',sub:'8am – 1pm'},{block:'PM',label:'Cobertura PM',sub:'1pm – 5pm'}];\n    const coverageRows=covBlocks.map(b=>{\n      const cells=satData.map(s=>{\n        const present=self.state.collaborators.filter(c=>{ const sh=self.shiftOf(c.id,s.iso); return b.block==='AM'?(sh==='AM'||sh==='COMP'):(sh==='PM'||sh==='COMP'); });\n        const dots=self.ROLES.map(r=>{ const ok=present.some(c=>c.role===r.key); return {abbr:r.abbr, ok,\n          style:{fontSize:'10px',fontWeight:800,padding:'2px 6px',borderRadius:'6px',background:ok?r.color:'#fee2e2',color:ok?'#fff':'#dc2626',border:ok?'1px solid transparent':'1px dashed #f87171'}}; });\n        const physOk=present.some(c=>c.mode==='fisico');\n        const ok=dots.every(d=>d.ok)&&(reqPhys?physOk:true)&&present.length>0;\n        if(!ok) alertCount++;\n        return {satIso:s.iso, ok,\n          wrapStyle:{flex:'1',minWidth:'104px',display:'flex',flexDirection:'column',gap:'5px',padding:'8px',borderRadius:'9px',background:ok?'#f0fdf4':'#fef2f2',border:'1px solid '+(ok?'#bbf7d0':'#fecaca')},\n          dots,\n          physStyle:{fontSize:'10px',fontWeight:800,padding:'2px 6px',borderRadius:'6px',alignSelf:'flex-start',background:physOk?accent:'#fee2e2',color:physOk?'#fff':'#dc2626',border:physOk?'1px solid transparent':'1px dashed #f87171'},\n          physLabel:physOk?'Físico':'Sin físico'};\n      });\n      return {label:b.label, sub:b.sub, cells};\n    });\n\n    // Detalle de alertas con explicación y sugerencia\n    const blockMeta={AM:{label:'Cobertura AM',time:'8am – 1pm'},PM:{label:'Cobertura PM',time:'1pm – 5pm'}};\n    const alerts=[];\n    satData.forEach(s=>{\n      ['AM','PM'].forEach(block=>{\n        const present=self.state.collaborators.filter(c=>{ const sh=self.shiftOf(c.id,s.iso); return block==='AM'?(sh==='AM'||sh==='COMP'):(sh==='PM'||sh==='COMP'); });\n        const issues=[];\n        const empty=present.length===0;\n        if(empty){\n          issues.push({problem:'No hay ningún colaborador asignado a este bloque.', suggestion:'Asigna colaboradores que cubran los 4 roles (Ventas, Administrativo, Contabilidad, Soporte) con al menos una persona física, usando turno '+block+' o Completo.'});\n        } else {\n          self.ROLES.filter(r=>!present.some(c=>c.role===r.key)).forEach(r=>{\n            const cands=self.state.collaborators.filter(c=>c.role===r.key);\n            const free=cands.filter(c=>{ const sh=self.shiftOf(c.id,s.iso); return sh!=='AM'&&sh!=='PM'&&sh!=='COMP'; });\n            let suggestion;\n            if(cands.length===0){ suggestion='No existe ningún colaborador con rol '+r.key+'. Créalo en la lista y asígnalo a este turno.'; }\n            else { const pool=free.length?free:cands; suggestion='Asigna a '+pool.map(c=>c.name).join(' o ')+' (rol '+r.key+') en turno '+block+' o Completo el '+s.head+'.'; }\n            issues.push({problem:'Falta presencia del rol '+r.key+' en este bloque.', suggestion});\n          });\n          if(reqPhys && !present.some(c=>c.mode==='fisico')){\n            const physCands=self.state.collaborators.filter(c=>c.mode==='fisico');\n            issues.push({problem:'Todos los colaboradores presentes son virtuales: nadie está físicamente.', suggestion:'Asigna al menos un colaborador físico'+(physCands.length?' ('+physCands.map(c=>c.name).join(', ')+')':', créalo primero')+' en turno '+block+' o Completo.'});\n          }\n        }\n        if(issues.length){ alerts.push({title:s.head+' · '+blockMeta[block].label, time:blockMeta[block].time, count:issues.length+' problema'+(issues.length===1?'':'s'), issues}); }\n      });\n    });\n\n    const alertOk=alertCount===0;\n    const modeBtn=(active)=>({flex:'1',padding:'11px',borderRadius:'10px',fontWeight:700,fontSize:'13px',cursor:'pointer',border:'1px solid '+(active?accent:'#e2e8f0'),background:active?accent:'#fff',color:active?'#fff':'#475569'});\n\n    return {\n      headerStyle:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px',padding:'16px 24px',background:accent,color:'#fff',flexWrap:'wrap'},\n      navBtnStyle:{background:'rgba(255,255,255,.15)',color:'#fff',border:'none',width:'34px',height:'34px',borderRadius:'9px',fontSize:'18px',cursor:'pointer',fontWeight:700,lineHeight:'1'},\n      monthLabel:MES[this.state.month]+' '+this.state.year,\n      onPrev:()=>self.prevMonth(), onNext:()=>self.nextMonth(),\n      alertOk, alertText: (alertOk?'✓ Todos los bloques cubiertos': '⚠ '+alertCount+' bloque'+(alertCount===1?'':'s')+' sin cubrir')+'  ›',\n      alertStyle:{fontSize:'13px',fontWeight:700,padding:'7px 14px',borderRadius:'20px',cursor:'pointer',background:alertOk?'rgba(34,197,94,.2)':'rgba(239,68,68,.22)',color:alertOk?'#bbf7d0':'#fecaca',border:'1px solid '+(alertOk?'rgba(34,197,94,.45)':'rgba(239,68,68,.5)')},\n      alerts, alertsOpen:this.state.alertsOpen, alertsNone:alertOk,\n      alertsHeadCount: alertOk?'Sin alertas': alertCount+' bloque'+(alertCount===1?'':'s')+' con alertas',\n      onOpenAlerts:()=>self.openAlerts(), onCloseAlerts:()=>self.closeAlerts(),\n      satData, rows, coverageRows,\n      addBtnStyle:{background:accent,color:'#fff',border:'none',padding:'8px 14px',borderRadius:'9px',fontWeight:700,fontSize:'13px',cursor:'pointer'},\n      exportBtnStyle:{background:'rgba(255,255,255,.15)',color:'#fff',border:'1px solid rgba(255,255,255,.25)',padding:'7px 13px',borderRadius:'9px',fontWeight:700,fontSize:'12px',cursor:'pointer',whiteSpace:'nowrap'},\n      onExport:()=>self.exportJpg(),\n      editBtnStyle:{background:'#fff',color:'#475569',border:'1px solid #e2e8f0',padding:'4px 9px',borderRadius:'7px',fontWeight:700,fontSize:'11px',cursor:'pointer'},\n      delBtnStyle:{background:'#fff',color:'#dc2626',border:'1px solid #fecaca',padding:'4px 9px',borderRadius:'7px',fontWeight:700,fontSize:'11px',cursor:'pointer'},\n      modalOpen:this.state.modalOpen,\n      modalTitle:this.state.editingId?'Editar colaborador':'Nuevo colaborador',\n      formName:this.state.form.name, formRole:this.state.form.role,\n      onName:e=>self.setForm({name:e.target.value}),\n      onRole:e=>self.setForm({role:e.target.value}),\n      onFisico:()=>self.setForm({mode:'fisico'}),\n      onVirtual:()=>self.setForm({mode:'virtual'}),\n      fisStyle:modeBtn(this.state.form.mode==='fisico'),\n      virStyle:modeBtn(this.state.form.mode==='virtual'),\n      onSave:()=>self.saveForm(), onCancel:()=>self.closeModal(), onAdd:()=>self.openAdd(),\n      cancelBtnStyle:{flex:'1',background:'#fff',color:'#475569',border:'1px solid #e2e8f0',padding:'12px',borderRadius:'10px',fontWeight:700,cursor:'pointer'},\n      saveBtnStyle:{flex:'1',background:accent,color:'#fff',border:'none',padding:'12px',borderRadius:'10px',fontWeight:700,cursor:'pointer'},\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
